# https://aquaproj.github.io/docs/reference/security/cosign-slsa
# https://aquaproj.github.io/docs/reference/security/policy-as-code/
# https://aquaproj.github.io/docs/products/aqua-installer
name: aqua-verify
on:
  pull_request:
    paths:
      - 'registry.yaml'
      - 'aqua.yaml'
      - 'aqua-checksums.json'
  push:
    branches: [master]
    paths:
      - 'registry.yaml'
      - 'aqua.yaml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer le client aqua
        uses: aquaproj/aqua-installer@v3.1.0
        with:
          aqua_version: v2.60.1
        env:
          # Désactive la vérif SLSA du binaire aqua au bootstrap uniquement :
          # aqua v2.60.1 embarque slsa-verifier v2.6.0, antérieur au support des
          # entrées tlog dssev001 (ajouté en slsa-verifier v2.7.1, cf
          # https://github.com/slsa-framework/slsa-verifier/pull/799) -> la vérif
          # du binaire aqua échoue. À retirer quand aqua bumpera slsa-verifier.
          # aqua reste vérifié par checksum ; les OUTILS gardent cosign/attestations.
          AQUA_DISABLE_SLSA: "true"

      - name: Installer cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Install eager + vérification SLSA du catalogue
        env:
          AQUA_GLOBAL_CONFIG: ${{ github.workspace }}/aqua.yaml
          AQUA_POLICY_CONFIG: ${{ github.workspace }}/aqua-policy.yaml
          AQUA_ROOT_DIR: ${{ runner.temp }}/aqua-root
          AQUA_LOG_LEVEL: debug
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          aqua install -a 2>&1 | tee aqua-install.log

      - name: Preuve de vérification
        if: always()
        run: |
          echo "## Vérifications SLSA du catalogue" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -iE "verifying a file with Cosign|verify GitHub Artifact Attestations|checksum" aqua-install.log \
            | sed 's/\x1b\[[0-9;]*m//g' | sort -u >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
