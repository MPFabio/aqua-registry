# https://aquaproj.github.io/docs/reference/security/cosign-slsa
# https://aquaproj.github.io/docs/reference/security/policy-as-code/
# https://aquaproj.github.io/docs/products/aqua-installer
# https://github.com/dorny/paths-filter
name: aqua-verify
# Le check "verify" est requis par la branch protection : le workflow se
# déclenche donc sur TOUTES les PR (pas de filtre paths au niveau du trigger,
# sinon les PR hors-scope attendent un statut qui n'arrive jamais). Le filtre
# de chemins est fait EN INTERNE : la vérification SLSA lourde ne tourne que
# si le catalogue/harness a changé ; sinon le job répond vert immédiatement.
on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read   # requis par paths-filter (liste des fichiers de la PR)
  id-token: write

concurrency:
  group: aqua-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Détecter si le catalogue a changé
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            catalog:
              - 'registry.yaml'
              - 'aqua.yaml'
              - 'aqua-policy.yaml'
              - 'aqua-checksums.json'

      - name: Installer le client aqua
        if: steps.changes.outputs.catalog == 'true' || github.event_name == 'workflow_dispatch'
        uses: aquaproj/aqua-installer@v3.1.0
        with:
          aqua_version: v2.60.1
        env:
          # Désactive la vérif SLSA du binaire aqua au bootstrap uniquement :
          # aqua v2.60.1 embarque slsa-verifier v2.6.0, antérieur au support des
          # entrées tlog dssev001 (ajouté en slsa-verifier v2.7.1, cf
          # https://github.com/slsa-framework/slsa-verifier/pull/799) -> la vérif
          # du binaire aqua échoue. À retirer quand aqua bumpera slsa-verifier.
          # aqua reste vérifié par checksum ; les OUTILS gardent cosign/attestations.
          AQUA_DISABLE_SLSA: "true"

      - name: Installer cosign
        if: steps.changes.outputs.catalog == 'true' || github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Install eager + vérification SLSA du catalogue
        if: steps.changes.outputs.catalog == 'true' || github.event_name == 'workflow_dispatch'
        env:
          AQUA_GLOBAL_CONFIG: ${{ github.workspace }}/aqua.yaml
          AQUA_POLICY_CONFIG: ${{ github.workspace }}/aqua-policy.yaml
          AQUA_ROOT_DIR: ${{ runner.temp }}/aqua-root
          AQUA_LOG_LEVEL: info
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          aqua install -a 2>&1 | tee aqua-install.log

      - name: Preuve de vérification
        if: always() && (steps.changes.outputs.catalog == 'true' || github.event_name == 'workflow_dispatch')
        run: |
          echo "## Vérifications SLSA du catalogue" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -iE "verifying a file with Cosign|verify GitHub Artifact Attestations|checksum" aqua-install.log \
            | sed 's/\x1b\[[0-9;]*m//g' | sort -u >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Hors périmètre catalogue — rien à vérifier
        if: steps.changes.outputs.catalog != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          echo "## Gate aqua-verify" >> "$GITHUB_STEP_SUMMARY"
          echo "Aucun fichier du catalogue modifié : pas de vérification SLSA à rejouer." >> "$GITHUB_STEP_SUMMARY"
