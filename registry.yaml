packages:
  - type: http
    name: kubernetes/kubectl
    url: https://dl.k8s.io/release/{{.Version}}/bin/linux/amd64/kubectl
    format: raw
    files:
      - name: kubectl

  - type: http
    name: helm/helm
    url: https://get.helm.sh/helm-{{.Version}}-linux-amd64.tar.gz
    format: tar.gz
    files:
      - name: helm
        src: linux-amd64/helm
