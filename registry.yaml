# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
# https://aquaproj.github.io/docs/reference/registry-config/
# https://aquaproj.github.io/docs/reference/security/cosign-slsa
packages:
  # https://github.com/aquaproj/aqua-registry/blob/v4.534.0/pkgs/kubernetes/kubernetes/kubectl/registry.yaml
  - name: kubernetes/kubernetes/kubectl
    aliases:
      - name: kubernetes/kubectl
    type: http
    repo_owner: kubernetes
    repo_name: kubernetes
    description: The kubectl command line tool lets you control Kubernetes clusters
    link: https://kubernetes.io/docs/reference/kubectl/
    version_filter: not (Version matches "-(alpha|beta|rc)")
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 1.2.7")
        url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        supported_envs:
          - amd64
      - version_constraint: semver("<= 1.15.3")
        url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl
        format: raw
        rosetta2: true
        windows_arm_emulation: true
      - version_constraint: semver("<= 1.20.15")
        url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl
        format: raw
        rosetta2: true
        windows_arm_emulation: true
        checksum:
          type: http
          url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.sha256
          algorithm: sha256
        overrides:
          - goos: windows
            checksum:
              type: http
              url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.exe.sha256
              algorithm: sha256
      - version_constraint: semver("<= 1.22.17")
        url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl
        format: raw
        windows_arm_emulation: true
        checksum:
          type: http
          url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.sha256
          algorithm: sha256
        overrides:
          - goos: windows
            checksum:
              type: http
              url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.exe.sha256
              algorithm: sha256
      - version_constraint: semver("<= 1.25.4")
        url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl
        format: raw
        checksum:
          type: http
          url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.sha256
          algorithm: sha256
        overrides:
          - goos: windows
            checksum:
              type: http
              url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.exe.sha256
              algorithm: sha256
      - version_constraint: "true"
        url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl
        format: raw
        checksum:
          type: http
          url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.sha256
          algorithm: sha256
        cosign:
          opts:
            - --signature
            - https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.sig
            - --certificate
            - https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.cert
            - --certificate-identity
            - "krel-staging@k8s-releng-prod.iam.gserviceaccount.com"
            - --certificate-oidc-issuer
            - "https://accounts.google.com"
        overrides:
          - goos: windows
            checksum:
              type: http
              url: https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.exe.sha256
              algorithm: sha256
            cosign:
              opts:
                - --signature
                - https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.exe.sig
                - --certificate
                - https://dl.k8s.io/{{.Version}}/bin/{{.OS}}/{{.Arch}}/kubectl.exe.cert
                - --certificate-identity
                - "krel-staging@k8s-releng-prod.iam.gserviceaccount.com"
                - --certificate-oidc-issuer
                - "https://accounts.google.com"
  # https://github.com/aquaproj/aqua-registry/blob/v4.534.0/pkgs/helm/helm/registry.yaml
  - type: http
    repo_owner: helm
    repo_name: helm
    url: https://get.helm.sh/helm-{{.Version}}-{{.OS}}-{{.Arch}}.tar.gz
    description: The Kubernetes Package Manager
    files:
      - name: helm
        src: "{{.OS}}-{{.Arch}}/helm"
    supported_envs:
      - darwin
      - linux
      - amd64
    checksum:
      type: http
      url: https://get.helm.sh/helm-{{.Version}}-{{.OS}}-{{.Arch}}.tar.gz.sha256sum
      algorithm: sha256
    version_constraint: semver(">= 3.6.0")
    version_overrides:
      - version_constraint: semver(">= 3.1.0")
        rosetta2: true
      - version_constraint: semver("< 3.1.0")
        rosetta2: true
        checksum:
          type: http
          url: https://get.helm.sh/helm-{{.Version}}-{{.OS}}-{{.Arch}}.tar.gz.sha256
          algorithm: sha256
  # https://github.com/aquaproj/aqua-registry/blob/v4.534.0/pkgs/hashicorp/terraform/registry.yaml
  - type: http
    repo_owner: hashicorp
    repo_name: terraform
    url: https://releases.hashicorp.com/terraform/{{trimV .Version}}/terraform_{{trimV .Version}}_{{.OS}}_{{.Arch}}.zip
    description: Terraform enables you to safely and predictably create, change, and improve infrastructure. It is an open source tool that codifies APIs into declarative configuration files that can be shared amongst team members, treated as code, edited, reviewed, and versioned
    supported_envs:
      - linux
      - darwin
      - amd64
    checksum:
      type: http
      url: https://releases.hashicorp.com/terraform/{{trimV .Version}}/terraform_{{trimV .Version}}_SHA256SUMS
      algorithm: sha256
    version_constraint: semver(">= 1.0.2")
    version_overrides:
      - version_constraint: "true"
        rosetta2: true
  # https://github.com/aquaproj/aqua-registry/blob/v4.534.0/pkgs/golang/go/registry.yaml
  - repo_owner: golang
    repo_name: go
    type: http
    url: https://golang.org/dl/go{{trimPrefix "go" .Version}}.{{.OS}}-{{.Arch}}.{{.Format}}
    description: The Go programming language
    format: tar.gz
    version_source: github_tag
    version_filter: Version startsWith "go" and not (Version contains "rc" or Version contains "beta")
    files:
      - name: go
        src: go/bin/go
      - name: gofmt
        src: go/bin/gofmt
    overrides:
      - goos: windows
        format: zip
  # https://github.com/aquaproj/aqua-registry/blob/v4.534.0/pkgs/astral-sh/uv/registry.yaml
  - type: github_release
    repo_owner: astral-sh
    repo_name: uv
    description: An extremely fast Python package installer and resolver, written in Rust
    version_constraint: "false"
    files:
      - name: uv
      - name: uvx
    version_overrides:
      - version_constraint: semver("<= 0.2.19")
        asset: uv-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        files:
          - name: uv
            src: "{{.AssetWithoutExt}}/uv"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            files:
              - name: uv
      - version_constraint: Version == "0.2.20"
        asset: uv-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        files:
          - name: uv
            src: "{{.AssetWithoutExt}}/uv"
          - name: uvx
            src: "{{.AssetWithoutExt}}/uvx"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            files:
              - name: uv
      - version_constraint: semver("<= 0.9.7") || Version in ["0.9.11", "0.11.9"]
        asset: uv-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        files:
          - name: uv
            src: "{{.AssetWithoutExt}}/uv"
          - name: uvx
            src: "{{.AssetWithoutExt}}/uvx"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            files:
              - name: uv
              - name: uvx
      - version_constraint: "true"
        asset: uv-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        windows_arm_emulation: true
        files:
          - name: uv
            src: "{{.AssetWithoutExt}}/uv"
          - name: uvx
            src: "{{.AssetWithoutExt}}/uvx"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            files:
              - name: uv
              - name: uvx
        github_artifact_attestations:
          signer_workflow: astral-sh/uv/.github/workflows/release.yml
